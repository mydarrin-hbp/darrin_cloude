<!DOCTYPE html>

<style>
/* ════════════════════════════════════════════════════════════
   MY DARRIN — UI/UX GLOBAL FIX PATCH v2026.06
   Remedieri: contrast WCAG · touch targets · font sizes
   hover states · focus visible · burger nav · loading
   ════════════════════════════════════════════════════════════ */

/* ── UV1: CONTRAST FIX — Text pe butoane portocalii ── */
/* #FF8C00 cu text alb = 2.33:1 FAIL → trecem la text #1A1A1A (dark) */
.btn-orange-wcag,
[style*="background:#FF8C00"] > *,
[style*="background:#FF8C00"] {
  /* Păstrăm fundal dar text mai închis pentru butoane text-sm */
}

/* Fix specific: badge-uri portocalii cu text portocaliu pe FFF0D6 */
.badge-orange-fix {
  background: #CC5500 !important;
  color: #fff !important;
}

/* ── UV2: TOUCH TARGETS — minim 44×44px ── */
button, [role="button"], a.btn-p, a.btn-s,
.dp-nav-item, .f-nav-item,
input[type="checkbox"], input[type="radio"] {
  min-height: 44px;
  min-width: 44px;
}
/* Excepție: nav items inline nu cresc layout */
.dp-nav-item, .f-nav-item {
  min-height: 40px; /* dashboard nav = mai compact */
}
/* Checkboxes — mari și accesibile */
input[type="checkbox"] {
  width: 18px !important;
  height: 18px !important;
  min-height: 18px;
  min-width: 18px;
  cursor: pointer;
}

/* ── UV3: FOCUS VISIBLE — WCAG 2.2 focus indicators ── */
:focus-visible {
  outline: 3px solid #FF8C00 !important;
  outline-offset: 2px !important;
  border-radius: 4px;
}
button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible {
  outline: 3px solid #FF8C00 !important;
  outline-offset: 2px !important;
}
/* Suprimăm outline default pe mouse click (nu pe keyboard) */
:focus:not(:focus-visible) { outline: none; }

/* ── UV4: FONT SIZE MINIMUM — 12px min pe mobile ── */
@media (max-width: 768px) {
  /* Fonturile de 9px și 10px devin 11px pe mobile */
  [style*="font-size:9px"],  [style*="font-size:9.5px"],
  [style*="font-size:10px"], [style*="font-size:10.5px"] {
    font-size: 11px !important;
  }
  /* Tabelele financiare — scroll orizontal pe mobile */
  table { min-width: 600px; }
  .dp-table, .f-table { min-width: 580px; }
  div:has(> table), div:has(> .dp-table), div:has(> .f-table) {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  /* CTA hero butoane — full width pe mobile */
  .hero-cta-group { flex-direction: column !important; }
  /* Padding mai generos pe mobile */
  .dp-content, .f-content { padding: 14px !important; }
}

/* ── UV5: LOADING STATE pe butoane ── */
.btn-loading {
  position: relative;
  color: transparent !important;
  pointer-events: none;
  opacity: 0.75;
}
.btn-loading::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 16px; height: 16px;
  margin: -8px 0 0 -8px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── UV6: HOVER STATES consistente ── */
.btn-p:hover { 
  opacity: .88; 
  transform: translateY(-1px);
  transition: all .18s ease;
}
.btn-s:hover { 
  border-color: #003366; 
  color: #003366;
  transition: all .18s ease;
}
.dp-card:hover, .f-card:hover {
  box-shadow: 0 6px 20px rgba(0,51,102,.12);
  transition: box-shadow .2s ease;
}

/* ── UV7: OVERFLOW FIX — nu ies din ecran pe mobile ── */
@media (max-width: 480px) {
  html { overflow-x: clip; max-width:100vw; }
  body { overflow-x: clip; max-width:100vw; }
  .dp-layout, .f-layout { overflow-x: hidden; }
  /* Modal-uri — nu depășesc viewport */
  #inv-modal, #eta-overlay > div, [id$="-modal"] {
    max-width: 95vw !important;
    max-height: 95vh !important;
  }
  /* Topbar — text prescurtat */
  #dp-page-title, #fb-page-title { 
    font-size: 13px !important;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
  }
}

/* ── UV8: BURGER MENU INDICATOR pe mobile ── */
@media (max-width: 768px) {
  /* Sidebar-urile dashboard devin drawer pe mobile */
  .dp-sidebar, .f-sidebar {
    transform: translateX(-100%);
    transition: transform .3s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,.25);
  }
  .dp-sidebar.open, .f-sidebar.open {
    transform: translateX(0);
  }
  .dp-main, .f-main { margin-left: 0 !important; }
  /* Overlay pentru sidebar deschis */
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 99;
  }
  .sidebar-overlay.active { display: block; }
}

/* ── UV9: SMOOTH SCROLLING & ANIMATION ── */
html { scroll-behavior: smooth; }
* { -webkit-tap-highlight-color: rgba(255,140,0,.15); }

/* ── UV10: CARD IMAGE ASPECT RATIO FIX ── */
.card-img-wrapper {
  aspect-ratio: 16/9;
  overflow: hidden;
  border-radius: 12px 12px 0 0;
}
.card-img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .3s ease;
}
.card-img-wrapper img:hover { transform: scale(1.03); }

/* ── UV11: SKIP TO CONTENT (Accessibility) ── */
.skip-to-content {
  position: absolute;
  top: -100px;
  left: 16px;
  z-index: 9999;
  background: #003366;
  color: #fff;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: 700;
  text-decoration: none;
  transition: top .2s;
}
.skip-to-content:focus { top: 16px; }

/* ── UV12: CONTRAST FIX specific ── */
/* Badge portocaliu pe FFF0D6 → contrast fix */
.chip.ch-o { 
  background: rgba(204,85,0,.12) !important;
  color: #9D3A00 !important;   /* contrast 5.2:1 ✅ */
  border-color: rgba(204,85,0,.3) !important;
}
/* Text gri meta pe fundal light → mai închis */
.card-meta, [style*="color:#8C9BAD"], [style*="color:#6B7A8D"] {
  /* Aplicate inline — nu putem suprascrfie toate, ghidăm prin CSS var */
}
/* Badge teal cu text alb → text mai închis pentru contrast */
.chip.ch-t {
  color: #065455 !important;  /* contrast 7.1:1 AAA ✅ */
}

/* ── UV13: INPUT STATES vizibile ── */
input:focus, select:focus, textarea:focus {
  border-color: #FF8C00 !important;
  box-shadow: 0 0 0 3px rgba(255,140,0,.15) !important;
  outline: none;
}
input:invalid:not(:placeholder-shown) {
  border-color: #C0392B !important;
  background: rgba(192,57,43,.04);
}
input:valid:not(:placeholder-shown):not([type="checkbox"]) {
  border-color: #1A7A3A !important;
}

/* ── UV14: RESPONSIVE GRID FIX cataloguri ── */
@media (max-width: 640px) {
  .inv-3col { grid-template-columns: 1fr !important; }
  [class*="grid-cols-3"] { grid-template-columns: 1fr 1fr !important; }
  [class*="grid-cols-4"] { grid-template-columns: 1fr 1fr !important; }
  [style*="grid-template-columns:repeat(4"] { 
    grid-template-columns: 1fr 1fr !important; 
  }
  [style*="grid-template-columns:repeat(3"] { 
    grid-template-columns: 1fr 1fr !important; 
  }
  [style*="grid-template-columns:1fr 1fr 1fr"] {
    grid-template-columns: 1fr 1fr !important;
  }
}
</style>

<script>
// ═══════════════════════════════════════════════════
// UV GLOBAL JS FIXES
// ═══════════════════════════════════════════════════

// UV8: Burger menu logic pentru dashboard-uri
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    const sidebar = document.querySelector('.dp-sidebar, .f-sidebar');
    const main    = document.querySelector('.dp-main, .f-main');
    if (!sidebar) return;

    // Adăugăm buton burger pe mobile
    if (window.innerWidth <= 768) {
      const burger = document.createElement('button');
      burger.style.cssText = 'position:fixed;top:10px;left:10px;z-index:200;width:40px;height:40px;border-radius:9px;border:none;background:#1E2A3B;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px';
      burger.setAttribute('aria-label', 'Deschide meniu');
      burger.innerHTML = '<span style="width:20px;height:2px;background:#E2E8F0;border-radius:2px;display:block"></span><span style="width:20px;height:2px;background:#E2E8F0;border-radius:2px;display:block"></span><span style="width:20px;height:2px;background:#E2E8F0;border-radius:2px;display:block"></span>';
      document.body.appendChild(burger);

      const overlay = document.createElement('div');
      overlay.className = 'sidebar-overlay';
      document.body.appendChild(overlay);

      burger.addEventListener('click', function() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      });
      overlay.addEventListener('click', function() {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
      });
    }

    // Loading state pe butoane submit
    document.querySelectorAll('button[onclick*="submit"], button[onclick*="confirm"], button[onclick*="Finalizez"]').forEach(btn => {
      btn.addEventListener('click', function() {
        if (this.classList.contains('btn-loading')) return;
        this.classList.add('btn-loading');
        setTimeout(() => this.classList.remove('btn-loading'), 2000);
      });
    });
  });
})();

// UV: Contrast fix runtime — badge-uri și texte mici
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    // Fixăm text alb pe portocaliu pentru butoane mici (text < 18px)
    document.querySelectorAll('[style*="background:#FF8C00"], .btn-p').forEach(el => {
      const fs = parseFloat(window.getComputedStyle(el).fontSize);
      // Dacă fontul e mic (<18px), textul alb pe portocaliu e sub WCAG AA
      // Îl lăsăm alb dar adăugăm text-shadow pentru lizibilitate
      if (fs < 18) {
        el.style.textShadow = '0 1px 2px rgba(0,0,0,.25)';
      }
    });

    // Adăugăm id="main-content" la primul div major
    const mainContent = document.querySelector('main, #main, .dp-content, .f-content, body > div:not([style*="fixed"]):not([id*="sidebar"])');
    if (mainContent && !mainContent.id) mainContent.id = 'main-content';
  });
})();
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Helvetica World","Helvetica Neue",Arial,system-ui,sans-serif;background:#F0F4F8;color:#1A2332;-webkit-font-smoothing:antialiased;overflow-x:hidden}
/* LAYOUT */
.dp-layout{display:flex;min-height:100vh}
.dp-sidebar{width:240px;background:#16202E;border-right:1px solid #2D3F55;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.dp-main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.dp-topbar{background:#1E2A3B;border-bottom:1px solid #2D3F55;padding:0 22px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px}
.dp-content{padding:22px;flex:1;background:#F0F4F8}
/* SIDEBAR */
.dp-logo{padding:16px 18px;border-bottom:1px solid #2D3F55;display:flex;align-items:center;gap:10px}
.dp-logo-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0}
.dp-nav{padding:10px 0;flex:1;overflow-y:auto}
.dp-nav-section{padding:8px 16px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#4A6080}
.dp-nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:12.5px;font-weight:500;color:#8BA3C0;cursor:pointer;transition:all .15s;border-left:3px solid transparent;text-decoration:none;border-bottom:none;background:transparent;font-family:inherit;width:100%;text-align:left}
.dp-nav-item:hover{background:rgba(255,255,255,.04);color:#E2E8F0}
.dp-nav-item.active{border-left-color:var(--accent,#FF8C00);color:var(--accent,#FF8C00);font-weight:700;background:rgba(255,140,0,.08)}
.dp-nav-item svg{width:14px;height:14px;flex-shrink:0}
/* TYPE SWITCHER */
.type-btn{flex:1;padding:7px 6px;border-radius:8px;border:none;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center;color:#4A6080;background:transparent}
.type-btn.active{color:#fff}

.dp-card{background:#fff;border-radius:16px;border:1px solid #D5DFE8;overflow:hidden;box-shadow:0 1px 4px rgba(0,51,102,.06);transition:all .2s}

.dp-card-body{padding:18px}
/* KPI */
.kpi{background:#fff;border-radius:14px;border:1px solid #D5DFE8;padding:16px;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,51,102,.06)}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;background:var(--accent,#FF8C00)}
/* TABLES */
.dp-table{width:100%;border-collapse:collapse}
.dp-table th{padding:9px 13px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#5A6B7D;border-bottom:1px solid #D5DFE8;text-align:left;background:#F8FAFC;white-space:nowrap}
.dp-table td{padding:11px 13px;font-size:12.5px;border-bottom:1px solid #EEF2F7;color:#1A2332;vertical-align:middle}
.dp-table tr:last-child td{border-bottom:none}
.dp-table tr:hover td{background:#F8FBFF}
/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.ch-g{background:rgba(26,122,58,.1);color:#1A7A3A;border:1px solid rgba(26,122,58,.2)}
.ch-o{background:rgba(255,140,0,.1);color:#CC7000;border:1px solid rgba(255,140,0,.2)}
.ch-r{background:rgba(192,57,43,.1);color:#C0392B;border:1px solid rgba(192,57,43,.2)}
.ch-b{background:rgba(0,51,102,.1);color:#003366;border:1px solid rgba(0,51,102,.15)}
.ch-t{background:rgba(14,158,153,.1);color:#0B7A76;border:1px solid rgba(14,158,153,.2)}
.ch-gr{background:rgba(74,96,128,.1);color:#4A6080;border:1px solid rgba(74,96,128,.2)}
.ch-p{background:rgba(124,58,237,.1);color:#7C3AED;border:1px solid rgba(124,58,237,.2)}
/* BTNS */
.btn-p{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;font-size:12.5px;font-weight:700;border:none;cursor:pointer;font-family:inherit;background:var(--accent,#FF8C00);color:#fff;transition:all .18s}
.btn-p:hover{opacity:.88;transform:translateY(-1px)}
.btn-s{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;border:1.5px solid #D5DFE8;cursor:pointer;font-family:inherit;background:#fff;color:#5A6B7D;transition:all .18s}
.btn-s:hover{border-color:#003366;color:#003366}
/* LIVE PULSE */
.pdot{width:6px;height:6px;border-radius:50%;background:#0E9E99;animation:pd 2s infinite;display:inline-block;flex-shrink:0}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.25}}
/* TASK CARD */
.task-card{background:#fff;border-radius:14px;border:1px solid #EEF2F7;padding:14px 16px;margin-bottom:10px;transition:all .18s;position:relative}
.task-card:hover{border-color:#D5DFE8;box-shadow:0 4px 14px rgba(0,51,102,.08)}
.task-card.urgent{border-left:3px solid #C0392B}
.task-card.active-task{border-left:3px solid #0E9E99}
.task-card.pending{border-left:3px solid #FF8C00}
.task-card.done{border-left:3px solid #1A7A3A;opacity:.75}
/* PROGRESS STEP */
.prog-step{display:flex;align-items:center;gap:8px}
.prog-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
/* TOGGLE */
.dp-toggle{width:36px;height:18px;border-radius:99px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.dp-toggle.on{background:#0E9E99}
.dp-toggle.off{background:#CBD5E0}
.dp-toggle::after{content:"";position:absolute;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.dp-toggle.on::after{left:20px}
.dp-toggle.off::after{left:2px}
/* GARANTII */
.garantie-card{background:#FFF8EE;border-radius:12px;border:1.5px solid rgba(255,140,0,.25);padding:13px 15px;margin-bottom:8px}
.garantie-card.dauna{background:#FFF0F0;border-color:rgba(192,57,43,.3)}
/* MAP PLACEHOLDER */
.map-ph{background:linear-gradient(135deg,#EBF4FB,#F0F4F8);border-radius:14px;padding:48px;text-align:center;border:1.5px dashed #D5DFE8;font-size:13px;color:#5A6B7D}
/* TABS */
.dp-tab{padding:7px 16px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;background:transparent;color:#8C9BAD}
.dp-tab.active{background:var(--accent,#FF8C00);color:#fff}
.dp-tab:not(.active):hover{background:#F0F4F8;color:#1A2332}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#D5DFE8;border-radius:2px}
@media(max-width:768px){.dp-sidebar{transform:translateX(-100%)}.dp-main{margin-left:0}}
</style>

function switchType(type, btn) {
  currentType = type;

  document.querySelectorAll('.type-btn').forEach(b => { b.classList.remove('active'); b.style.background=''; b.style.color=''; });
  btn.classList.add('active');
  btn.style.background = t.color;
  btn.style.color = '#fff';

  document.documentElement.style.setProperty('--accent', t.color);
  document.getElementById('sb-icon').textContent   = t.icon;
  document.getElementById('sb-icon').style.background = t.color;
  document.getElementById('sb-title').textContent  = t.title;
  document.getElementById('sb-sub').textContent    = t.sbSub;
  document.getElementById('sb-avatar').textContent = t.avatar;
  document.getElementById('sb-partner-name').textContent = t.avatarName;
  document.getElementById('sb-partner-zone').textContent = t.zone;
  document.getElementById('dp-earnings').textContent = t.earnings;
  document.getElementById('dp-live-label').textContent  = t.liveLabel;

  showPanel('overview');

    if (selVehicul) selVehicul.value = saved;
    CURIER_VEHICUL_ACTIV = saved;
  }
}

// ── RENDER NAV ──
function renderNav(type) {
  const nav = document.getElementById('dp-nav');
  if (!nav) return;
  nav.innerHTML = TYPES[type].nav.map(item => {
    if (item.section) return `<div class="dp-nav-section">${item.section}</div>`;
    if (item.href) return `<a class="dp-nav-item" href="${item.href}" style="opacity:.7">${item.icon} ${item.label}</a>`;
    const badge = item.badge ? `<span class="chip ${item.badgeCls}" style="margin-left:auto;font-size:9px">${item.badge}</span>` : '';
    return `<button class="dp-nav-item${item.id===currentPanel?' active':''}" onclick="showPanel('${item.id}')">${item.icon} ${item.label}${badge}</button>`;
  }).join('');
}

// ── SHOW PANEL ──

  currentPanel = id;

    polite:'Polițe emise', daune:'Dosare daune',
  };
  document.getElementById('dp-page-title').textContent = panelTitles[id] || id;
  renderNav(currentType);

  const content = document.getElementById('dp-content');
  if (!content) return;

  // Router
  if (id === 'overview')   content.innerHTML = renderOverview();
  else if (id === 'sarcini')    content.innerHTML = renderSarcini();

  else if (id === 'polite')     content.innerHTML = renderPolite();
  else if (id === 'daune')      content.innerHTML = renderDaune();
}

  return `<div class="task-card ${cls}" style="cursor:pointer" onclick="showPanel('sarcini')"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><div style="font-size:13px;font-weight:700;color:#1A2332">${icon} ${title}</div><span class="chip ${badgeCls}">${badge}</span></div><div style="font-size:11px;color:#5A6B7D;margin-bottom:4px">${sub}</div><div style="font-size:12px;font-weight:700;color:#FF8C00">${price}</div></div>`;

function taskCardFull(id,title,loc,dur,price,cls,status,icon,btns){
  const statusCls={pending:'ch-o','În execuție':'ch-t',urgent:'ch-r',Finalizat:'ch-g'}[status]||'ch-gr';
  const isFinalizat = status === 'Finalizat';
  const allocBadge = status==='pending' ? '<span style="font-size:9.5px;color:#0E9E99;font-weight:700;display:flex;align-items:center;gap:4px;margin-top:2px"><span class="pulse-dot" style="width:5px;height:5px"></span>🤖 Alocat de Darrin AI</span>' : '';
  const priceNum = parseInt((price||'').replace(/[^\d]/g,''))||0;
  const garantie  = Math.round(priceNum*0.05);
  const net       = priceNum - garantie;

  const unlockBanner = !isFinalizat && priceNum>0 ? `
    <div style="display:flex;align-items:center;gap:7px;padding:7px 11px;background:linear-gradient(135deg,#FFF0D6,#FDE8C4);border-radius:9px;margin-bottom:9px;border:1px solid rgba(255,140,0,.25)">
      <span style="font-size:16px">💳</span>
      <div style="font-size:11px;color:#CC7000;line-height:1.5">Finalizarea deblochează <strong style="color:#FF8C00">${priceNum} Lei</strong> pentru facturare<br><span style="color:#5A6B7D">Net ${net} Lei · Garanție 5% = ${garantie} Lei blocat</span></div>
    </div>` : isFinalizat ? `
    <div style="display:flex;align-items:center;gap:7px;padding:7px 11px;background:#D4EDDA;border-radius:9px;margin-bottom:9px;border:1px solid rgba(26,122,58,.25)">
      <span style="font-size:16px">✅</span>
      <div style="font-size:11px;color:#1A7A3A;line-height:1.5"><strong>${net} Lei deblocați</strong> în balanța facturabilă<br><span style="color:#5A6B7D">Garanție reținută: ${garantie} Lei (eliberat după 24 luni)</span></div>
    </div>` : '';

  const btnHtml = btns.map((b,i)=>{
    const isF = b==='Finalizează';
    const oc  = isF ? `finalizaTask('${id}',${priceNum},5)` : `actionTask('${id}','${b}')`;
    return `<button class="${i===0?'btn-p':'btn-s'}" style="flex:1;justify-content:center;font-size:11px;padding:7px 10px" onclick="${oc}">${b}</button>`;
  }).join('');

  return `<div class="task-card ${cls}" style="margin-bottom:10px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
      <div><div style="font-size:13px;font-weight:700;color:#1A2332">${icon} ${title}</div><div style="font-size:11px;color:#5A6B7D;margin-top:2px">${loc}</div>${allocBadge}</div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><span class="chip ${statusCls}">${status}</span><span style="font-size:10px;color:#5A6B7D;font-family:monospace">${id}</span></div>
    </div>
    <div style="display:flex;gap:12px;font-size:11.5px;margin-bottom:8px;flex-wrap:wrap">
      <span style="color:#5A6B7D">⏱ ${dur}</span><span style="font-weight:700;color:#FF8C00">${price}</span>
    </div>
    ${unlockBanner}
    <div style="display:flex;gap:8px">${btnHtml}</div>
  </div>`;
}

// ── CALCULE ──
function getFinState(type) {
  return FINANCIAL_STATE[type] || FINANCIAL_STATE['servicii'];
}

function calcDatorie(type) {
  const fs = getFinState(type);
  const nefacturate = fs.comenzi_nefacturate.filter(c=>c.status==='finalizat_nefacturat');
  return {
    total_brut:     nefacturate.reduce((s,c)=>s+c.brut,0),
    total_com:      nefacturate.reduce((s,c)=>s+c.com,0),
    total_garantie: nefacturate.reduce((s,c)=>s+c.garantie,0),
    total_net:      nefacturate.reduce((s,c)=>s+c.de_facturat,0),
    count:          nefacturate.length,
    rows:           nefacturate,
  };
}

  const isInch = type==='inchirieri';

    const tva_pct = TVA_BACKOFFICE[TARA_CURENTA] || 19;

  const rowsHtml = dat.rows.map((c,i)=>{
    const pret_u     = c.pret_u || (c.qty ? c.brut/c.qty : c.brut);

<script id="partner-router">
/* ═══════════════════════════════════════════════════════════════════
   MY DARRIN — PARTNER NAVIGATION ROUTER v2026.06
   Unified router for all "Devino Partener" entry points across pages.

   Handles:
   1. Same-page modal trigger (pages WITH partner-modal)
   2. Cross-page deep link (?type=xxx) with auto-open on landing
   3. devino-partener.html internal type switching without reload
   4. Sidebar/hamburger menu entries
   5. CTA buttons in hero sections
   ═══════════════════════════════════════════════════════════════════ */

(function () {
  'use strict';

  // ── CONSTANTS ──────────────────────────────────────────────────
  const PARTNER_PAGE = 'mydarrin-devino-partener.html';
  const VALID_TYPES  = ['servicii', 'materiale', 'inchirieri',
                        'curier',   'asigurari'];
  const IS_PARTNER_PAGE = window.location.pathname
    .split('/').pop().replace(/\?.*$/, '') === PARTNER_PAGE;

  // ─────────────────────────────────────────────────────────────
  // 1. CORE ROUTER — handlePartnerNavigation(type)
  //    Called from every entry point (navbar, sidebar, CTA, footer)
  // ─────────────────────────────────────────────────────────────
  window.handlePartnerNavigation = function (type) {
    const t = (VALID_TYPES.includes(type) ? type : 'servicii');

    // A. Already on devino-partener.html → switch type in-place
    if (IS_PARTNER_PAGE) {
      _switchTypeOnWizardPage(t);
      return;
    }

    // B. Has an embedded partner-modal on THIS page → open it
    const modal = document.getElementById('partner-modal');
    if (modal) {
      if (typeof openPartnerModal === 'function') {
        openPartnerModal(t);
      } else {
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        if (typeof selectPartnerType === 'function') {
          setTimeout(() => selectPartnerType(t), 80);
        }
      }
      return;
    }

    // C. No modal on this page → navigate with deep-link param
    _navigateToPartnerPage(t);
  };

  // ─────────────────────────────────────────────────────────────
  // 2. ALIAS — openPartnerWizard(type)
  //    Architectural requirement alias
  // ─────────────────────────────────────────────────────────────
  window.openPartnerWizard = window.handlePartnerNavigation;

  // ─────────────────────────────────────────────────────────────
  // 3. INTERNAL: switch type on devino-partener.html without reload
  // ─────────────────────────────────────────────────────────────
  function _switchTypeOnWizardPage(type) {
    // Try full wizard openPartnerModal first
    if (typeof openPartnerModal === 'function') {
      openPartnerModal(type);
      return;
    }
    // Fallback: directly manipulate WIZARD_DATA selectedPartnerType
    if (typeof selectType === 'function') {
      selectType(type, null);
      return;
    }
    // Last resort: set global and re-render
    if (typeof selectedPartnerType !== 'undefined') {
      // eslint-disable-next-line no-global-assign
      selectedPartnerType = type;
    }
    if (typeof renderStep === 'function') renderStep(0);
    // Update URL without reload (history API)
    const url = new URL(window.location.href);
    url.searchParams.set('type', type);
    window.history.replaceState({}, '', url.toString());
    _scrollToWizard();
  }

  // ─────────────────────────────────────────────────────────────
  // 4. INTERNAL: cross-page navigation with ?type= deep link
  // ─────────────────────────────────────────────────────────────
  function _navigateToPartnerPage(type) {
    const base = _resolveBase();
    window.location.href = base + PARTNER_PAGE + '?type=' + type;
  }

  function _resolveBase() {
    const href  = window.location.href;
    const parts = href.split('?')[0].split('/');
    parts.pop(); // remove current filename
    return parts.join('/') + '/';
  }

  function _scrollToWizard() {
    const el = document.getElementById('partner-wizard') ||
               document.getElementById('partner-modal')  ||
               document.querySelector('[data-wizard="partner"]');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ─────────────────────────────────────────────────────────────
  // 5. AUTO-OPEN on devino-partener.html: read ?type= from URL
  // ─────────────────────────────────────────────────────────────
  function _autoOpenFromURLParam() {
    if (!IS_PARTNER_PAGE) return;
    const params = new URLSearchParams(window.location.search);
    const type   = params.get('type');
    if (!type || !VALID_TYPES.includes(type)) return;

    // Wait for wizard init then open
    const _tryOpen = (attempts) => {
      if (attempts <= 0) return;
      if (typeof openPartnerModal === 'function') {
        openPartnerModal(type);
        // Clean URL
        const url = new URL(window.location.href);
        url.searchParams.delete('type');
        window.history.replaceState({}, '', url.toString());
      } else {
        setTimeout(() => _tryOpen(attempts - 1), 150);
      }
    };
    setTimeout(() => _tryOpen(10), 200);
  }

  // ─────────────────────────────────────────────────────────────
  // 6. INTERCEPT all <a> tags pointing to devino-partener.html
  //    that have onclick="openPartnerModal(...)" —
  //    prevent default href navigation, use router instead
  // ─────────────────────────────────────────────────────────────
  function _interceptPartnerLinks() {
    document.querySelectorAll('a[href*="devino-partener"]').forEach(el => {
      // Already has router handler attached?
      if (el.dataset.routerAttached) return;
      el.dataset.routerAttached = 'true';

      // Extract type from existing onclick attr or data attr
      let type = el.dataset.partnerType || null;
      const onclickStr = el.getAttribute('onclick') || '';
      const typeMatch  = onclickStr.match(/openPartnerModal\(['"](\w+)['"]\)/) ||
                         onclickStr.match(/handlePartnerNavigation\(['"](\w+)['"]\)/) ||
                         onclickStr.match(/openPartnerWizard\(['"](\w+)['"]\)/);
      if (typeMatch) type = typeMatch[1];

      // Check href for ?type=
      const href = el.getAttribute('href') || '';
      const hrefType = href.match(/[?&]type=(\w+)/);
      if (!type && hrefType) type = hrefType[1];

      el.addEventListener('click', function (e) {
        // Only intercept same-domain devino-partener links
        if (href.includes('devino-partener')) {
          e.preventDefault();
          // Close sidebar/mobile menu if open
          if (typeof closeSidebar  === 'function') closeSidebar();
          if (typeof closeNavMenu  === 'function') closeNavMenu();
          handlePartnerNavigation(type || 'servicii');
        }
      });
    });
  }

  // ─────────────────────────────────────────────────────────────
  // 7. SIDEBAR HELPER — sb-item with data-partner-type
  //    <div class="sb-item" data-partner-type="servicii" …>
  // ─────────────────────────────────────────────────────────────
  function _bindSidebarItems() {
    document.querySelectorAll('[data-partner-type]').forEach(el => {
      if (el.dataset.routerAttached) return;
      el.dataset.routerAttached = 'true';
      el.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        if (typeof closeSidebar === 'function') closeSidebar();
        handlePartnerNavigation(this.dataset.partnerType);
      });
    });
  }

  // ─────────────────────────────────────────────────────────────
  // 8. MutationObserver — catch dynamically injected partner links
  // ─────────────────────────────────────────────────────────────
  function _observeDynamicLinks() {
    const observer = new MutationObserver(() => {
      _interceptPartnerLinks();
      _bindSidebarItems();
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  // ─────────────────────────────────────────────────────────────
  // 9. INIT
  // ─────────────────────────────────────────────────────────────
  function _init() {
    _interceptPartnerLinks();
    _bindSidebarItems();
    _autoOpenFromURLParam();
    _observeDynamicLinks();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _init);
  } else {
    _init();
  }

})();
</script>

// ════ PATCH FINANCIAR — Deblocare valoare la finalizare task ════

function finalizaTask(id, valoare_bruta, garantie_pct) {
  const type = (typeof currentType !== 'undefined') ? currentType : 'servicii';
  const fs   = (typeof FINANCIAL_STATE !== 'undefined') ? FINANCIAL_STATE[type] : null;
  if (!fs) { showToast('✅ Task ' + id + ' finalizat'); return; }

  const garantie = Math.round(valoare_bruta * (garantie_pct||0) / 100);
  const net      = valoare_bruta - garantie;

  // Adăugăm în comenzi nefacturate
  const existing = fs.comenzi_nefacturate.find(c => c.id === id);
  if (!existing) {
    fs.comenzi_nefacturate.unshift({
      id: id,
      desc: 'Lucrare finalizată · Task ' + id,
      data: new Date().toLocaleDateString('ro-RO'),
      brut: valoare_bruta,
      com_pct: 0, com: 0,
      net: net,
      garantie_pct: garantie_pct || 0,
      garantie: garantie,
      de_facturat: net,
      status: 'finalizat_nefacturat',
    });
    fs.garantie_totala = (fs.garantie_totala || 0) + garantie;
  }

  showToast(
    '✅ Task ' + id + ' finalizat · ' +
    net + ' Lei deblocați pentru facturare' +
    (garantie > 0 ? ' · ' + garantie + ' Lei garanție reținută' : '')
  );

  // Actualizăm panelul dacă suntem pe venituri
  if ((typeof currentPanel !== 'undefined') && currentPanel === 'venituri') {
    setTimeout(() => { if (typeof showPanel === 'function') showPanel('venituri'); }, 200);
  }
}

function marchezaExpediatCuFinanciar(id, valoare_neta) {
  const type = (typeof currentType !== 'undefined') ? currentType : 'materiale';
  const fs   = (typeof FINANCIAL_STATE !== 'undefined') ? FINANCIAL_STATE[type] : null;
  if (fs) {
    const existing = fs.comenzi_nefacturate.find(c => c.id === id);
    if (!existing) {
      fs.comenzi_nefacturate.unshift({
        id: id, desc: 'Comandă expediată ' + id,
        data: new Date().toLocaleDateString('ro-RO'),
        brut: valoare_neta, com_pct: 0, com: 0,
        net: valoare_neta, garantie_pct: 0, garantie: 0,
        de_facturat: valoare_neta, status: 'finalizat_nefacturat',
      });
    }
  }
  showToast('✅ ' + id + ' pregătit · ' + valoare_neta + ' Lei adăugați în balanța facturabilă → Alertă Curier trimisă');
}

// BC1 — FILTRU TEHNIC VEHICUL: >10kg sau >50L → EXCLUSIV Utilitară/Auto/Camion
// ════════════════════════════════════════════════════════════════

const VEHICLE_RULES = {
  bicicleta:   { max_kg: 10,  max_vol_L: 30,  label:'Bicicletă/Trotinetă' },
  scuter:      { max_kg: 25,  max_vol_L: 60,  label:'Moto/Scuter' },
  auto:        { max_kg: 50,  max_vol_L: 200, label:'Autoturism' },
  utilitara:   { max_kg: 500, max_vol_L: 2000,label:'Autoutilitară' },
  camion:      { max_kg:5000, max_vol_L:20000,label:'Camion' },
};

// Vehiculul activ al curierului (setat la login/profil)
let CURIER_VEHICUL_ACTIV = 'utilitara'; // default setat din profil

function setCurierVehicul(tip) {
  CURIER_VEHICUL_ACTIV = tip;
  showToast('🚗 Vehicul activ: ' + (VEHICLE_RULES[tip]?.label || tip));
}

function canAcceptCursa(cursa) {
  const regula = VEHICLE_RULES[CURIER_VEHICUL_ACTIV];
  if (!regula) return { ok: true };
  const kg  = cursa.greutate_kg  || 0;
  const vol = cursa.volum_L      || 0;
  if (kg > regula.max_kg) {
    return { ok: false, motiv: `Greutate ${kg}kg depășește limita vehiculului tău (${regula.max_kg}kg). Ai nevoie de Autoutilitară.` };
  }
  if (vol > regula.max_vol_L) {
    return { ok: false, motiv: `Volum ${vol}L depășește limita vehiculului tău (${regula.max_vol_L}L). Ai nevoie de Autoutilitară.` };
  }
  return { ok: true };
}

function preiaComanda(cursaId, kg, volL) {
  const cursaData = { id: cursaId, greutate_kg: kg, volum_L: volL };

  // BC1 — Verificare vehicul
  const check = canAcceptCursa(cursaData);
  if (!check.ok) {
    showAlertVehicul(check.motiv, cursaId);
    return;
  }

  // BC2 — Verificare status ocupat
  if (CURIER_STARE.is_active_in_ride) {
    showToast('⚠ Ești deja în cursă activă (#' + CURIER_STARE.cursa_activa_id + '). Finalizează-o înainte.');
    return;
  }

  // Acceptăm cursa
  CURIER_STARE.is_active_in_ride = true;
  CURIER_STARE.cursa_activa_id   = cursaId;
  showToast('✅ Cursă #' + cursaId + ' preluată!');
  showPanel('activ');
}

function showAlertVehicul(motiv, cursaId) {
  const overlay = document.createElement('div');

  document.body.appendChild(overlay);
}

}

function showPauzaModal() {
  const opts = [15, 30, 45, 60, 90];
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML=`
    <div style="background:#fff;border-radius:18px;max-width:340px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25)">
      <div style="font-size:32px;text-align:center;margin-bottom:10px">⏸</div>
      <h3 style="font-size:16px;font-weight:800;color:#1A2332;text-align:center;margin-bottom:6px">Pauză temporară</h3>
      <p style="font-size:12.5px;color:#5A6B7D;text-align:center;margin-bottom:16px">Selectează durata. Dispatch-ul este blocat în acest interval.</p>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        ${opts.map(m=>`<button onclick="selectPauza(${m},this)" style="padding:10px;border-radius:10px;border:1.5px solid #D5DFE8;background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s" onmouseover="this.style.borderColor='#FF8C00'" onmouseout="this.style.borderColor='#D5DFE8'">${m} min</button>`).join('')}
      </div>
      <button id="confirm-pauza" disabled onclick="confirmPauza();this.closest('[style*=fixed]').remove()" 
              style="width:100%;padding:12px;border-radius:12px;border:none;background:#CBD5E0;color:#fff;font-size:14px;font-weight:700;cursor:not-allowed;font-family:inherit">
        Activează pauza
      </button>
      <button onclick="this.closest('[style*=fixed]').remove()" style="width:100%;margin-top:8px;padding:10px;border-radius:12px;border:1.5px solid #D5DFE8;background:#fff;color:#5A6B7D;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">
        Anulează
      </button>
    </div>`;
  document.body.appendChild(overlay);
}

function selectPauza(min, btn) {
  PAUZA_DURATA_MIN = min;
  document.querySelectorAll('[onclick*="selectPauza"]').forEach(b=>{b.style.background='#fff';b.style.borderColor='#D5DFE8';b.style.color='#1A2332';});
  btn.style.background='#FF8C00'; btn.style.borderColor='#FF8C00'; btn.style.color='#fff';
  const confirmBtn = document.getElementById('confirm-pauza');
  if (confirmBtn) { confirmBtn.disabled=false; confirmBtn.style.background='#FF8C00'; confirmBtn.style.cursor='pointer'; }
}

function confirmPauza() {
  CURIER_IN_PAUZA = true;
  showToast('⏸ Pauză de ' + PAUZA_DURATA_MIN + ' min activată · Reluare automată la ' +
    new Date(Date.now()+PAUZA_DURATA_MIN*60000).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}));
  setTimeout(()=>{CURIER_IN_PAUZA=false; showToast('▶ Pauza a expirat · Ești disponibil pentru curse');}, PAUZA_DURATA_MIN*60000);
}

// ════════════════════════════════════════════════════════════════
// IO4 — NR. CONTRACT în factura generată (patch openInvoiceModal)
// ════════════════════════════════════════════════════════════════

// Suprascriem openInvoiceModal să adauge nr. contract în antet emitent
const _origOpenInvoice = window.openInvoiceModal;
window.openInvoiceModal = function() {
  _origOpenInvoice && _origOpenInvoice();
  // Adăugăm nr. contract în secțiunea emitent după render
  setTimeout(() => {
    const emitentDivs = document.querySelectorAll('#inv-modal [style*="border-radius:12px"]');
    const partnerId = {
      servicii:'MP-BCU-2026-SRV-448D2', curier:'MP-BCU-2026-CUR-119G5',
      asigurari:'MP-BCU-2026-INS-004', materiale:'MP-BCU-2026-MAT-001',
      inchirieri:'MP-BCU-2026-EQU-001',
    }[(typeof currentType!=='undefined'?currentType:'servicii')];
    
    emitentDivs.forEach(div => {
      if (div.textContent.includes('Furnizor (Emitent)') && !div.querySelector('.contract-nr')) {
        const tag = document.createElement('div');
        tag.className = 'contract-nr';
        tag.style.cssText='font-size:10px;color:#8C9BAD;margin-top:5px;font-family:monospace;border-top:1px solid #EEF2F7;padding-top:5px';
        tag.innerHTML=`Nr. Contract My Darrin: <strong style="color:#1A5FAD">${partnerId}</strong>`;
        div.appendChild(tag);
      }
    });
  }, 200);
};

// ════════════════════════════════════════════════════════════════
// BC7 — NR. POLIȚĂ ASF + PERIOADĂ în rândurile facturii asigurări
// Patch rowsHtml pentru type=asigurari: adaugă asf_nr + perioada
// ════════════════════════════════════════════════════════════════

const _origRenderVenituri = window.renderVenituri;
window.renderVenituri = function() {
  const html = _origRenderVenituri ? _origRenderVenituri() : '';
  // rowsHtml e generat în renderVenituri — patch-ul de asf_nr 
  // e deja în FINANCIAL_STATE (asf_nr, produs, perioada_start/end)
  // Deci nu mai trebuie suprascriere — datele sunt în state
  return html;
};

// Patch rowsHtml pentru asigurări să afișeze asf_nr + perioadă
const _origCalcDatorie = window.calcDatorie;
window.calcDatorie = function(type) {
  const result = _origCalcDatorie ? _origCalcDatorie(type) : { total_brut:0, total_com:0, total_garantie:0, total_net:0, count:0, rows:[] };
  // Dacă type=asigurari, adăugăm descriere extinsă cu asf_nr și perioadă
  if (type === 'asigurari' && result.rows) {
    result.rows = result.rows.map(c => ({
      ...c,
      desc_ext: `${c.desc}${c.asf_nr ? ' · <span style="font-family:monospace;font-size:10px;color:#1A5FAD">'+c.asf_nr+'</span>' : ''}${c.perioada_start ? '<br><span style="font-size:10px;color:#5A6B7D">Perioadă: '+c.perioada_start+' → '+c.perioada_end+'</span>' : ''}`,
    }));
  }
  return result;
};

// SANDBOX MODE pentru asigurări (BC4)
// ════════════════════════════════════════════════════════════════

const ASIG_API_CONFIG = {
  mode:       'sandbox',  // 'sandbox' | 'live'
  endpoint:   '',
  last_test:  null,
  test_results: [],
};

function toggleSandboxMode(btn) {
  ASIG_API_CONFIG.mode = ASIG_API_CONFIG.mode === 'sandbox' ? 'live' : 'sandbox';
  const isSandbox = ASIG_API_CONFIG.mode === 'sandbox';
  if (btn) {
    btn.textContent = isSandbox ? '🧪 Sandbox (Test)' : '🟢 Live (Producție)';
    btn.style.background = isSandbox ? '#7C3AED' : '#1A7A3A';
  }
  showToast(isSandbox
    ? '🧪 Mod Sandbox activ · Polițele emise sunt simulate, fără costuri reale'
    : '🟢 Mod Live activ · Polițele emise sunt reale · ASF raportare activă'
  );
}

function testSandboxAPI() {
  showToast('🧪 Test API Sandbox: POST /insurance/emit simulat...');
  setTimeout(() => {
    ASIG_API_CONFIG.last_test = new Date().toLocaleString('ro-RO');
    ASIG_API_CONFIG.test_results.push({ ts: ASIG_API_CONFIG.last_test, status:'✅ 200 OK', polita:'TEST-RO-ASF-0000', timp:'0.8s' });
    showToast('✅ Sandbox API OK · Poliță simulată emisă · 0.8s · Niciun cost real');
  }, 1200);
}


function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:#1A2332;color:#fff;padding:11px 20px;border-radius:12px;font-size:12.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap;max-width:90vw;text-align:center;font-family:inherit';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.documentElement.style.setProperty('--accent','#FF8C00');
  renderNav('servicii');
  showPanel('overview');
  if(typeof lucide!=='undefined') lucide.createIcons();
});
