<style>
:root { --primary:#003366; --accent:#FF8C00; --teal:#0E9E99; }
*{box-sizing:border-box}
body{font-family:'Helvetica World','Helvetica Neue',Arial,system-ui,sans-serif;background:#F4F7F9;color:#2D2D2D;margin:0;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

.logo-mark{width:34px;height:34px;background:#FF8C00;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}

<body>

<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark">D</div>
    <span style="font-weight:800;font-size:15px;color:#1A2332">My Darrin</span>
  </a>

  <div id="state-loading">
    <p style="font-size:13.5px;color:#5A6B7D">Se verifică link-ul de recuperare...</p>
  </div>

  <div id="state-form" style="display:none">
    <h1 style="font-size:20px;font-weight:800;margin:0 0 6px;color:#1A2332">Setează o parolă nouă</h1>
    <p style="font-size:13px;color:#5A6B7D;margin:0 0 20px">Alege o parolă nouă pentru contul tău.</p>

    <form id="reset-form" onsubmit="return submitResetPassword(event)">
      <div class="field">
        <label>Parolă nouă</label>
        <input type="password" id="new-pass" minlength="8" required placeholder="Minimum 8 caractere"/>
        <button type="button" class="eye-btn" onclick="togglePasswordVisibility('new-pass', this)" aria-label="Arată parola">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="field">
        <label>Confirmă parola</label>
        <input type="password" id="new-pass-confirm" minlength="8" required placeholder="Repetă parola"/>
        <button type="button" class="eye-btn" onclick="togglePasswordVisibility('new-pass-confirm', this)" aria-label="Arată parola">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button type="submit" id="reset-submit-btn" class="submit">Salvează parola nouă</button>
      <div id="msg"></div>
    </form>
  </div>

  <div id="state-invalid" style="display:none">
    <p style="font-size:13.5px;color:#C0392B;margin:0 0 14px">Link de recuperare invalid sau expirat.</p>
    <a href="/" style="font-size:13px;font-weight:700;color:#003366">← Înapoi la My Darrin</a>
  </div>

</div>

<script type="module" src="lib/supabaseClient.js"></script>
<script src="account-system.js"></script>
<script>
// Supabase (detectSessionInUrl:true, în lib/supabaseClient.js) procesează
// automat token-ul de recuperare din URL la inițializarea clientului și
// emite un eveniment PASSWORD_RECOVERY — dar clientul e un modul ES, încărcat
// asincron, deci nu presupunem că e gata imediat la DOMContentLoaded.
function asteaptaSupabaseClient() {
  return new Promise((resolve) => {
    if (window.supabaseClient) return resolve(window.supabaseClient);
    const iv = setInterval(() => {
      if (window.supabaseClient) { clearInterval(iv); resolve(window.supabaseClient); }
    }, 50);
  });
}

(async function initResetPassword() {
  const sb = await asteaptaSupabaseClient();

  let sesiuneRecuperareValida = false;
  sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') sesiuneRecuperareValida = true;
  });

  // Rasă condiție: dacă evenimentul PASSWORD_RECOVERY s-a declanșat deja
  // înainte de a atașa listener-ul de mai sus, verificăm direct sesiunea —
  // Supabase o creează oricum din token-ul din URL.
  const { data: { session } } = await sb.auth.getSession();
  if (session) sesiuneRecuperareValida = true;

  document.getElementById('state-loading').style.display = 'none';
  if (sesiuneRecuperareValida) {
    document.getElementById('state-form').style.display = 'block';
  } else {
    document.getElementById('state-invalid').style.display = 'block';
  }
})();

async function submitResetPassword(e) {
  e.preventDefault();
  const pass = document.getElementById('new-pass').value;
  const passConfirm = document.getElementById('new-pass-confirm').value;
  const msgEl = document.getElementById('msg');
  const btn = document.getElementById('reset-submit-btn');
  msgEl.className = '';
  msgEl.textContent = '';

  if (pass.length < 8) {
    msgEl.className = 'err';
    msgEl.textContent = 'Parola trebuie să aibă minimum 8 caractere.';
    return false;
  }
  if (pass !== passConfirm) {
    msgEl.className = 'err';
    msgEl.textContent = 'Parolele nu coincid.';
    return false;
  }

  btn.disabled = true;
  btn.textContent = 'Se salvează...';
  try {
    const { error } = await window.supabaseClient.auth.updateUser({ password: pass });
    if (error) throw error;
    msgEl.className = 'ok';
    msgEl.textContent = '✓ Parola a fost schimbată. Te redirecționăm...';
    setTimeout(() => { window.location.href='/'; }, 1500);
  } catch (err) {
    msgEl.className = 'err';
    msgEl.textContent = err.message || 'Nu am putut salva parola nouă.';
    btn.disabled = false;
    btn.textContent = 'Salvează parola nouă';
  }
  return false;
}
</script>
</body>
