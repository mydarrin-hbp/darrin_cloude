<style>
:root { --navy:#1E2E4D; --orange:#EF7F1A; --teal:#09A299; --teal-dark:#117A73; }
*{box-sizing:border-box}
body{font-family:'Helvetica World','Helvetica Neue',Arial,system-ui,sans-serif;background:#10192E;color:#fff;margin:0;-webkit-font-smoothing:antialiased;overflow:hidden}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(16,25,46,.9);backdrop-filter:blur(8px);z-index:100;border-bottom:1px solid rgba(255,255,255,.08)}
.topbar a{color:rgba(255,255,255,.6);font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px}
.topbar .actions{display:flex;gap:10px;align-items:center}
.btn-top{background:var(--orange);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
.counter{font-size:12px;color:rgba(255,255,255,.4);font-variant-numeric:tabular-nums}
.stage{position:fixed;top:56px;bottom:64px;left:0;right:0;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 8vw;opacity:0;pointer-events:none;transition:opacity .35s ease;background:linear-gradient(135deg,var(--navy),#101a30)}
.slide.active{opacity:1;pointer-events:auto}
.eyebrow{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--teal);margin-bottom:14px}
.slide h1{font-size:clamp(28px,5vw,52px);font-weight:800;margin:0 0 14px;letter-spacing:-.01em;max-width:900px;text-wrap:balance}
.slide .subtitlu{font-size:clamp(14px,1.6vw,18px);color:rgba(255,255,255,.65);max-width:700px;margin:0 0 28px;line-height:1.6}
.slide-body{width:100%;max-width:980px}
.point-row{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px;text-align:left}
.point-dot{width:34px;height:34px;border-radius:10px;background:rgba(9,162,153,.15);border:1px solid rgba(9,162,153,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal)}
.point-h{font-weight:700;font-size:15px;margin-bottom:3px}
.point-d{font-size:13px;color:rgba(255,255,255,.55);line-height:1.5}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;text-align:left}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;text-align:left}
.card-mini{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px}
.card-mini .k{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.4);margin-bottom:6px}
.card-mini .v{font-size:22px;font-weight:800;color:var(--orange)}
.circles{display:flex;align-items:center;justify-content:center;gap:-20px;position:relative;height:260px}
.circle{position:absolute;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;flex-direction:column}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th,.tbl td{border:1px solid rgba(255,255,255,.12);padding:9px 10px;text-align:center}
.tbl th{background:rgba(255,255,255,.06);font-weight:700;color:var(--teal)}
.tbl td:first-child,.tbl th:first-child{text-align:left}
.team-row{display:flex;gap:22px;justify-content:center;flex-wrap:wrap}
.avatar{width:76px;height:76px;border-radius:50%;background:rgba(239,127,26,.15);border:2px solid var(--orange);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--orange);margin:0 auto 10px}
.donut-wrap{display:flex;align-items:center;gap:36px;justify-content:center;flex-wrap:wrap}
.legend-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px}
.legend-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.nav-bar{position:fixed;bottom:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:center;gap:18px;background:rgba(16,25,46,.9);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.08);z-index:100}
.nav-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;width:38px;height:38px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:disabled{opacity:.3;cursor:default}
.dots{display:flex;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:background .2s}
.dot.active{background:var(--orange)}
@media (max-width:720px){ .grid2,.grid3{grid-template-columns:1fr} .team-row{flex-direction:column;align-items:center} }
@media print {
  .topbar,.nav-bar{display:none}
  body{overflow:visible;background:#fff;color:#000}
  .stage{position:static}
  .slide{position:static;opacity:1;page-break-after:always;min-height:100vh;background:var(--navy)!important;color:#fff}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="mydarrin-investitori.html">&larr; Înapoi la Investitori</a>
  <div class="actions">
    <span class="counter" id="slide-counter">1 / 15</span>
    <button class="btn-top" onclick="window.print()">Descarcă / Printează</button>
  </div>
</div>

<div class="stage" id="stage"></div>

<div class="nav-bar">
  <button class="nav-btn" id="btn-prev" onclick="mergiSlide(-1)" aria-label="Slide anterior">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="btn-next" onclick="mergiSlide(1)" aria-label="Slide următor">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
  </button>
</div>

<script type="module" src="lib/supabaseClient.js"></script>
<script>
// Conținut de rezervă — folosit dacă nicio versiune aprobată nu există încă
// în pitch_deck_versiuni (backoffice). Cifrele rundei (500.000 EUR / 20%
// equity / 2.5M EUR pre-money) sunt cele deja live pe mydarrin-investitori.html
// — sursa de adevăr pentru cifre financiare rămâne pagina de investiții, nu
// draftul de pitch deck primit (acolo apăreau valori diferite și
// contradictorii între ele: 500k vs 1.3M vs 26% equity).
const SLIDES_REZERVA = [
  { tip:'titlu', eyebrow:'Seed Pitch · 2026', titlu:'MY DARRIN', subtitlu:'Standardizarea viitorului în mentenanța și serviciile tehnice.', text:'Antreprenorul General Digital: eficiență AI-native pentru o piață de peste 40 Mld. €.' },
  { tip:'puncte', eyebrow:'Problema', titlu:'O piață fragmentată și ineficientă', puncte:[
    {h:'Lipsa de încredere', d:'Selecție bazată pe recomandări nesigure și prețuri arbitrare.'},
    {h:'Ineficiență operațională', d:'Timpi de așteptare mari și lipsă de trasabilitate.'},
    {h:'Economie informală', d:'Servicii nefiscalizate, fără garanție sau suport post-intervenție.'},
  ]},
  { tip:'puncte', eyebrow:'Soluția', titlu:'Ecosistemul de încredere My Darrin', puncte:[
    {h:'Soluție unică integrată', d:'Totul de la diagnoză la garanție, într-o singură platformă.'},
    {h:'Standardizare radicală', d:'Prețuri fixe, procese auditate și furnizori verificați (KYC/KYB).'},
    {h:'Garanție integrată', d:'My Darrin își asumă responsabilitatea execuției — Escrow și asigurare.'},
  ]},
  { tip:'puncte', eyebrow:'Produsul', titlu:'Tehnologie care elimină eroarea umană', puncte:[
    {h:'AI multimodal', d:'Diagnoză instantanee prin text, audio sau video.'},
    {h:'Motor de deviz inteligent', d:'Generare automată de devize și necesar de materiale.'},
    {h:'Dispatch inteligent', d:'Alocare în sub 15 minute, bazată pe proximitate și rating.'},
  ]},
  { tip:'titlu', eyebrow:'Misiune & Viziune', titlu:'De la mentenanță reactivă la mentenanță predictivă', subtitlu:'Misiune: să digitalizăm infrastructura serviciilor tehnice pentru siguranța fiecărui cămin și business.', text:'Viziune: cel mai mare furnizor de servicii din Europa fără să deținem o singură mașină sau unealtă — model asset-light.' },
  { tip:'tam', eyebrow:'Oportunitatea de piață', titlu:'O piață masivă, pregătită pentru disrupție', tam:'40 Mld. €+', sam:'500 Mil. €', som:'39.7 Mil. €', tamL:'TAM — piața UE de mentenanță și servicii reziden.', samL:'SAM — mediul urban digitalizat din România', somL:'SOM — obiectiv de penetrare, Faza 1 (RO & UE select)' },
  { tip:'grid', eyebrow:'Sectoare & servicii vizate', titlu:'Acoperire multi-verticală', carduri:[
    {k:'Home & Garden', v:'Instalații, electrice, mentenanță curte'},
    {k:'Mobility', v:'Service auto mobil și asistență rutieră'},
    {k:'Business', v:'Property management pentru centre comerciale și HoReCa'},
    {k:'Logistică', v:'Transport, mutări, închirieri utilaje'},
  ]},
  { tip:'planuri', eyebrow:'Model de business', titlu:'Monetizare și scalabilitate', text:'Comision pe tranzacție: 22–30% · Abonamente SaaS recurente · Marketplace materiale.' },
  { tip:'puncte', eyebrow:'Model operațional', titlu:'Asset-light: scalare fără limite fizice', puncte:[
    {h:'Fără active fixe', d:'Nu deținem flote sau sedii logistice.'},
    {h:'Onboarding automatizat', d:'Scalare rapidă a bazei de furnizori prin KYC digital.'},
    {h:'Eficiență marginală', d:'Costul de a adăuga un oraș nou tinde spre zero.'},
  ]},
  { tip:'puncte', eyebrow:'Tracțiune & validare', titlu:'Dovezi de creștere și product-market fit', puncte:[
    {h:'Lansare pilot', d:'Validare în 7 hub-uri regionale: Bacău (sediu central), București, Cluj, Iași, Timișoara, Brașov, Constanța.'},
    {h:'Parteneriate strategice', d:'Acorduri prealabile cu asigurători și dezvoltatori.'},
    {h:'Unit economics', d:'LTV/CAC optimizat prin rețeaua B2B și B2G.'},
  ]},
  { tip:'echipa', eyebrow:'Echipa', titlu:'Experiență demonstrată în execuție', membri:[
    {n:'Cristian Popa', r:'CEO', d:'Expert în management operațional și servicii.'},
    {n:'Andreea Popa', r:'CMO', d:'Strategie de brand și achiziție utilizatori.'},
    {n:'Theo Barca', r:'CTO', d:'Arhitect AI și sisteme scalabile.'},
  ]},
  { tip:'puncte', eyebrow:'Concurența', titlu:'Poziționare: dincolo de "anunțuri"', puncte:[
    {h:'Plată garantată', d:'Escrow real, nu doar un anunț fără urmărire.'},
    {h:'Diagnostic AI', d:'Structurare tehnică automată, nu descrieri libere.'},
    {h:'Garanție & scalabilitate', d:'Responsabilitate asumată de platformă, model replicabil pe orice oraș nou.'},
  ]},
  { tip:'titlu', eyebrow:'Proiecții financiare', titlu:'Calea către creștere susținută', subtitlu:'Anul 1–2: fază de investiție și validare, break-even România estimat în Anul 2.', text:'Anul 3–5: expansiune UE. Marjă EBITDA proiectată 12–14% în Anul 5.' },
  { tip:'ask', eyebrow:'The Ask', titlu:'Runda Pre-Seed 2026', suma:'500.000 EUR', equity:'20%', premoney:'2.500.000 EUR', alocare:[
    {label:'IT & AI — platformă, algoritmi, deploy, mentenanță', pct:35},
    {label:'Marketing — achiziție utilizatori, onboarding parteneri', pct:45},
    {label:'Operațiuni & Echipă — nucleu operațional, expansiune regională', pct:15},
    {label:'Rezerve', pct:5},
  ]},
  { tip:'contact', eyebrow:'Contact', titlu:'Să construim viitorul împreună', subtitlu:'Contactați-ne pentru a accesa Data Room-ul complet.', contacte:['Cristian Popa, CEO','contact@homebestpal.com','investor@homebestpal.com','mydarrin.homebestpal.com'] },
];

let SLIDES = SLIDES_REZERVA;
let idx = 0;

function iconPunct(){
  return '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>';
}

function randSlide(s){
  let inner = '';
  if (s.tip === 'titlu') {
    inner = `<div class="eyebrow">${esc(s.eyebrow||'')}</div><h1>${esc(s.titlu)}</h1><p class="subtitlu">${esc(s.subtitlu||'')}</p>${s.text?`<p class="subtitlu" style="color:rgba(255,255,255,.45)">${esc(s.text)}</p>`:''}`;
  } else if (s.tip === 'puncte') {
    inner = `<div class="eyebrow">${esc(s.eyebrow)}</div><h1 style="font-size:clamp(22px,3.4vw,36px)">${esc(s.titlu)}</h1><div class="slide-body" style="margin-top:18px">${s.puncte.map(p=>`
      <div class="point-row"><div class="point-dot">${iconPunct()}</div><div><div class="point-h">${esc(p.h)}</div><div class="point-d">${esc(p.d)}</div></div></div>`).join('')}</div>`;
  } else if (s.tip === 'grid') {
    inner = `<div class="eyebrow">${esc(s.eyebrow)}</div><h1 style="font-size:clamp(22px,3.4vw,36px)">${esc(s.titlu)}</h1><div class="slide-body grid2" style="margin-top:18px">${s.carduri.map(c=>`
      <div class="card-mini"><div class="k">${esc(c.k)}</div><div style="font-size:13px;color:rgba(255,255,255,.6)">${esc(c.v)}</div></div>`).join('')}</div>`;
  } else if (s.tip === 'tam') {
    inner = `<div class="eyebrow">${esc(s.eyebrow)}</div><h1 style="font-size:clamp(22px,3.4vw,36px)">${esc(s.titlu)}</h1><div class="slide-body grid3" style="margin-top:24px">
      <div class="card-mini" style="text-align:center;border-color:rgba(9,162,153,.3)"><div class="k">TAM</div><div class="v" style="color:var(--teal)">${esc(s.tam)}</div><div class="point-d" style="margin-top:6px">${esc(s.tamL)}</div></div>
      <div class="card-mini" style="text-align:center;border-color:rgba(17,122,115,.4)"><div class="k">SAM</div><div class="v" style="color:var(--teal-dark)">${esc(s.sam)}</div><div class="point-d" style="margin-top:6px">${esc(s.samL)}</div></div>
      <div class="card-mini" style="text-align:center;border-color:rgba(239,127,26,.4)"><div class="k">SOM</div><div class="v">${esc(s.som)}</div><div class="point-d" style="margin-top:6px">${esc(s.somL)}</div></div>
    </div>`;
  } else if (s.tip === 'planuri') {
    inner = `<div class="eyebrow">${esc(s.eyebrow)}</div><h1 style="font-size:clamp(22px,3.4vw,36px)">${esc(s.titlu)}</h1><p class="subtitlu">${esc(s.text)}</p><div class="slide-body" style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>Resurse</th><th>Bronz</th><th>Argint</th><th>Aur</th><th>Platină</th></tr></thead>
      <tbody>
        <tr><td>Tip proiect</td><td>Intervenții simple</td><td>Lucrări medii</td><td>Proiecte complexe</td><td>Enterprise</td></tr>
        <tr><td>Garanție inclusă</td><td>30 zile</td><td>60 zile</td><td>180 zile</td><td>12 luni</td></tr>
        <tr><td>Prioritate dispatch</td><td>Standard</td><td>Prioritar</td><td>VIP</td><td>Instant</td></tr>
        <tr><td>Asigurare & QA</td><td>Opțională</td><td>—</td><td>QA extins</td><td>Inclusă 12 luni</td></tr>
      </tbody></table></div>`;
  } else if (s.tip === 'echipa') {
    inner = `<div class="eyebrow">${esc(s.eyebrow)}</div><h1 style="font-size:clamp(22px,3.4vw,36px)">${esc(s.titlu)}</h1><div class="slide-body team-row" style="margin-top:20px">${s.membri.map(m=>`
      <div style="max-width:180px;text-align:center"><div class="avatar">${esc(m.n.split(' ').map(w=>w[0]).join(''))}</div><div style="font-weight:700;font-size:14px">${esc(m.n)}</div><div style="color:var(--orange);font-size:11.5px;font-weight:700;margin-bottom:6px">${esc(m.r)}</div><div class="point-d">${esc(m.d)}</div></div>`).join('')}</div>`;
  } else if (s.tip === 'ask') {
    const colors = ['#EF7F1A','#09A299','#117A73','#3D5170'];
    let acc = 0;
    const stops = s.alocare.map((a,i)=>{ const start=acc; acc+=a.pct; return `${colors[i%colors.length]} ${start}% ${acc}%`; }).join(',');
    inner = `<div class="eyebrow">${esc(s.eyebrow)}</div><h1 style="font-size:clamp(22px,3.4vw,36px)">${esc(s.titlu)}</h1>
      <div class="slide-body grid3" style="margin-bottom:20px">
        <div class="card-mini" style="text-align:center"><div class="k">Valoare rundă</div><div class="v">${esc(s.suma)}</div></div>
        <div class="card-mini" style="text-align:center"><div class="k">Equity oferit</div><div class="v" style="color:var(--teal)">${esc(s.equity)}</div></div>
        <div class="card-mini" style="text-align:center"><div class="k">Pre-money</div><div class="v" style="color:#fff;font-size:18px">${esc(s.premoney)}</div></div>
      </div>
      <div class="slide-body donut-wrap">
        <div style="width:150px;height:150px;border-radius:50%;background:conic-gradient(${stops})"></div>
        <div style="text-align:left">${s.alocare.map((a,i)=>`<div class="legend-row"><span class="legend-dot" style="background:${colors[i%colors.length]}"></span>${a.pct}% — ${esc(a.label)}</div>`).join('')}</div>
      </div>`;
  } else if (s.tip === 'contact') {
    inner = `<div class="eyebrow">${esc(s.eyebrow)}</div><h1>${esc(s.titlu)}</h1><p class="subtitlu">${esc(s.subtitlu)}</p>
      <div class="slide-body" style="margin-bottom:26px">${s.contacte.map(c=>`<div style="font-size:14px;color:rgba(255,255,255,.7);margin-bottom:6px">${esc(c)}</div>`).join('')}</div>
      <a href="mydarrin-investitori.html" style="display:inline-block;background:var(--orange);color:#fff;padding:14px 30px;border-radius:12px;font-weight:800;font-size:14px;text-decoration:none">Investește în My Darrin</a>`;
  }
  return `<div class="slide">${inner}</div>`;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }

function randerTot(){
  document.getElementById('stage').innerHTML = SLIDES.map(randSlide).join('');
  document.getElementById('dots').innerHTML = SLIDES.map((_,i)=>`<div class="dot" onclick="mergiLa(${i})"></div>`).join('');
  actualizeaza();
}

function actualizeaza(){
  document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('active', i===idx));
  document.querySelectorAll('.dot').forEach((el,i)=>el.classList.toggle('active', i===idx));
  document.getElementById('slide-counter').textContent = `${idx+1} / ${SLIDES.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === SLIDES.length - 1;
}

function mergiSlide(delta){
  idx = Math.min(SLIDES.length - 1, Math.max(0, idx + delta));
  actualizeaza();
}
function mergiLa(i){ idx = i; actualizeaza(); }

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') mergiSlide(1);
  if (e.key === 'ArrowLeft') mergiSlide(-1);
});

(async function initDeck(){
  randerTot();
  try {
    const res = await fetch('/api/public/pitch-deck');
    const data = await res.json();
    if (res.ok && Array.isArray(data.slides) && data.slides.length) {
      SLIDES = data.slides;
      idx = 0;
      randerTot();
    }
  } catch (e) {
    console.error('[pitch-deck] folosesc conținutul de rezervă:', e);
  }
})();
</script>
</body>
</html>
